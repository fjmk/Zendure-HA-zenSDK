        unit_of_measurement: "W"
        state_class: measurement
        device_class: power

      - name: "Zendure 2400 AC SOC-limiet Status"
        value_template: >
          {% set states = {0: "Normale werking", 1: "Laadlimiet bereikt", 2: "Ontlaadlimiet bereikt"} %}
          {% set packState = value_json['properties']['socLimit'] | int %}
          {{ states.get(packState, "Onbekend") }}
        unique_id: zendure_2400_ac_soc_limiet_status
        icon: >
         {% if this.state == 'Normale werking' %}
          mdi:battery-medium
         {% elif this.state == 'Laadlimiet bereikt' %}
          mdi:battery-high
         {% elif this.state == 'Ontlaadlimiet bereikt' %}
          mdi:battery-low
         {% else %}
          mdi:battery-outline
         {% endif %}
          
      - name: "Zendure 2400 AC Batterij Serienummers"
        value_template: >
          {% set volgorde_raw = states('input_text.zendure_2400_ac_batterij_volgorde') %}
          {% set packdata = value_json['packData'] %}
          {% set ns = namespace(sn_list=[]) %}
          {% if not packdata %}
            unknown
          {% elif volgorde_raw in ['unknown', 'unavailable', ''] %}
            {% for pack in packdata %}
              {% set ns.sn_list = ns.sn_list + [ pack['sn'] ] %}
            {% endfor %}
          {% else %}
            {% set volgorde = volgorde_raw.split(';') %}
            {% for v in volgorde %}
              {% set idx = (v | int) - 1 %}
              {% if idx >= 0 and idx < packdata | length %}
                {% set ns.sn_list = ns.sn_list + [ packdata[idx]['sn'] ] %}
              {% endif %}
            {% endfor %}
          {% endif %}
          {{ ns.sn_list | join('\n') }}
        unique_id: Zendure_2400_AC_Batterij_Serienummers
        icon: mdi:identifier


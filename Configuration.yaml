# Laad standaard set van integraties. Niet verwijderen.
default_config:

# Laad frontend thema's uit de themes-map
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

input_select:
  zendure_2400_ac_modus_selecteren:
    name: Zendure 2400 AC Modus Selecteren
    icon: mdi:battery-charging-wireless
    options:
      - Standby
      - Handmatig
      - Nul op de meter
      - Dynamisch NOM
      - Dynamisch NOM (Duur)
      - Dynamisch Handelen
      - Dynamisch Handelen + NOM
      - Alleen slim ontladen
      - Alleen slim opladen
      - Snel opladen
      - Snel ontladen

input_button:
  zendure_2400_ac_advies_instellingen_overnemen:
    name: Zendure 2400 AC Advies Instellingen Overnemen
    icon: mdi:hand-pointer

input_boolean:
  dynamisch_15_minuten:
    name: Dynamisch 15 Minuten
    icon: mdi:clock-time-three-outline

  dynamisch_recent_geladen:
    name: Dynamisch Recent Geladen
    icon: mdi:battery-check

  dynamisch_laden_loopt:
    name: Dynamisch Laden Loopt
    icon: mdi:battery-check

  dynamisch_ontladen_loopt:
    name: Dynamisch Ontladen Loopt
    icon: mdi:battery-check

  dynamisch_tonen_op_dashboard:
    name: Dynamisch Tonen Op Dashboard
    icon: mdi:cash

  help_tonen_op_dashboard:
    name: Help Tonen Op Dashboard
    icon: mdi:information-outline

input_text:
  zendure_2400_ac_batterij_volgorde:
    name: Zendure 2400 AC Batterij Volgorde
    icon: mdi:flip-vertical
    max: 11
    mode: text

  zendure_2400_ac_ip_adres:
    name: Zendure 2400 AC IP-adres
    icon: mdi:ip
    max: 50
    mode: text

  homewizard_p1_ip_adres:
    name: Homewizard P1 IP-adres
    icon: mdi:ip
    max: 50
    mode: text

  afwijkende_p1_sensor:
    name: Afwijkende P1 Sensor
    icon: mdi:transmission-tower
    max: 250
    mode: text

  dynamisch_nordpool_sensor:
    name: Dynamisch Nordpool Sensor
    icon: mdi:cash
    max: 250
    mode: text

  dynamisch_handmatige_periode:
    name: Dynamisch Handmatige Periode
    icon: mdi:view-grid
    max: 250
    mode: text

  dynamisch_handmatige_periode_morgen:
    name: Dynamisch Handmatige Periode Morgen
    icon: mdi:view-grid
    max: 250
    mode: text

input_number:
  zendure_2400_ac_max_oplaadvermogen:
    name: Zendure 2400 AC Max. Oplaadvermogen
    icon: mdi:format-vertical-align-top
    min: 800
    max: 4800
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_2400_ac_max_ontlaadvermogen:
    name: Zendure 2400 AC Max. Ontlaadvermogen
    icon: mdi:format-vertical-align-bottom
    min: 800
    max: 4800
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_2400_ac_ontladen_starten_bij:
    name: Zendure 2400 AC Ontladen Starten Bij
    icon: mdi:battery-minus-variant
    min: 100
    max: 500
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_2400_ac_opladen_starten_bij:
    name: Zendure 2400 AC Opladen Starten Bij
    icon: mdi:battery-plus-variant
    min: -1000
    max: -100
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_2400_ac_standby_vertraging:
    name: Zendure 2400 AC Standby Vertraging
    icon: mdi:pause
    min: 5
    max: 30
    step: 1
    mode: box
    unit_of_measurement: "Min"

  zendure_2400_ac_oplaadmarge:
    name: Zendure 2400 AC Oplaadmarge
    icon: mdi:arrow-expand-vertical
    min: 0
    max: 250
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_2400_ac_ontlaadmarge:
    name: Zendure 2400 AC Ontlaadmarge
    icon: mdi:arrow-expand-vertical
    min: 0
    max: 250
    step: 1
    mode: box
    unit_of_measurement: "W"

  zendure_2400_ac_handmatig_vermogen:
    name: Zendure 2400 AC Handmatig Vermogen
    icon: mdi:flash
    min: -4800
    max: 4800
    step: 1
    mode: box
    unit_of_measurement: "W"

  dynamisch_minimale_spread:
    name: Dynamisch Minimale Spread
    icon: mdi:percent-box
    min: 0
    max: 100
    step: 1
    unit_of_measurement: '%'
    mode: box

  dynamisch_goedkoopste_x_periode:
    name: Dynamisch Goedkoopste X Periode
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

  dynamisch_duurste_x_periode:
    name: Dynamisch Duurste X Periode
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

  dynamisch_goedkoopste_x_periode_morgen:
    name: Dynamisch Goedkoopste X Periode Morgen
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

  dynamisch_duurste_x_periode_morgen:
    name: Dynamisch Duurste X Periode Morgen
    icon: mdi:view-grid-plus
    min: 0
    max: 96
    step: 1
    mode: box

sensor:
  - platform: history_stats
    name: "P1 Nul Import Duur (Vandaag)"
    unique_id: p1_nul_import_duur_vandaag
    entity_id: binary_sensor.p1_nul_import_actief
    state: "on"
    type: time
    start: "{{ today_at() if now() < today_at('23:59') else now() }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Zendure 2400 AC Relais Schakelingen Opladen Vandaag"
    unique_id: zendure_2400_ac_relais_schakelingen_opladen_vandaag
    entity_id: sensor.zendure_2400_ac_modus
    state: "Opladen"
    type: count
    start: "{{ today_at() if now() < today_at('23:59') else now() }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Zendure 2400 AC Relais Schakelingen Ontladen Vandaag"
    unique_id: zendure_2400_ac_relais_schakelingen_ontladen_vandaag
    entity_id: sensor.zendure_2400_ac_modus
    state: "Ontladen"
    type: count
    start: "{{ today_at() if now() < today_at('23:59') else now() }}"
    end: "{{ now() }}"

  - platform: statistics
    name: "Zendure 2400 AC Efficiëntie Import (24u gemiddelde)"
    unique_id: zendure_2400_ac_efficientie_import_24u
    entity_id: sensor.zendure_2400_ac_efficientie_import
    state_characteristic: mean
    sampling_size: 86400
    max_age:
      hours: 24

  - platform: statistics
    name: "Zendure 2400 AC Efficiëntie Export (24u gemiddelde)"
    unique_id: zendure_2400_ac_efficientie_export_24u
    entity_id: sensor.zendure_2400_ac_efficientie_export
    state_characteristic: mean
    sampling_size: 86400
    max_age:
      hours: 24

  - platform: integration
    name: "Zendure 2400 AC Energie Import"
    unique_id: zendure_2400_ac_energie_import
    source: sensor.zendure_2400_ac_vermogen_import
    unit_prefix: k
    round: 2
    method: trapezoidal

  - platform: integration
    name: "Zendure 2400 AC Energie Export"
    unique_id: zendure_2400_ac_energie_export
    source: sensor.zendure_2400_ac_vermogen_export
    unit_prefix: k
    round: 2
    method: trapezoidal

  - platform: rest
    name: "GitHub Zendure-HA-zenSDK (Gielz1986)"
    unique_id: github_zendure_ha_zensdk_gielz1986
    resource: "https://api.github.com/repos/Gielz1986/Zendure-HA-zenSDK/releases/latest"
    headers:
      User-Agent: "HomeAssistant"
    scan_interval: 3600
    json_attributes:
      - tag_name
      - name
      - published_at
      - body
    value_template: "{{ value_json.tag_name }}"
    icon: mdi:github

template:
  - binary_sensor:
      - name: "P1 Nul Import Actief"
        unique_id: p1_nul_import_actief
        device_class: power
        state: "{{ states('sensor.p1_aansturing_vermogen') | float(0) < 1 }}"
        icon: >
          {% if states('sensor.p1_aansturing_vermogen') | float(0) < 1 %}
            mdi:leaf
          {% else %}
            mdi:flash
          {% endif %}

  - sensor:
      - name: "Zendure 2400 AC Configuratie Versie"
        unique_id: Zendure_2400_AC_Configuratie_Versie
        icon: mdi:one-up
        state: "(April 2026) v20260307"

      - name: "Zendure-HA-Zensdk Github Releasecheck"
        unique_id: zendure_ha_zensdk_github_releasecheck
        state: >
          {% set config_date = states('sensor.zendure_2400_ac_configuratie_versie')
             | regex_findall('v(\d{8})') | first %}
          {% set github_date = state_attr('sensor.github_zendure_ha_zensdk_gielz1986', 'tag_name')
             | regex_replace('v','') %}
          {% if config_date and github_date %}
            {% if config_date > github_date %}
              Pre-release actief
            {% elif config_date < github_date %}
              Nieuwe release op GitHub
            {% else %}
              Up-to-date
            {% endif %}
          {% else %}
            Onbekend
          {% endif %}
        icon: >
         {% if this.state == 'Up-to-date' %}
          mdi:emoticon-happy-outline
         {% elif this.state == 'Nieuwe release op GitHub' %}
          mdi:emoticon-sad-outline
         {% elif this.state == 'Pre-release actief' %}
          mdi:test-tube
         {% else %}
          mdi:emoticon-sad-outline
         {% endif %}

      - name: "P1 NOM Doel"
        unique_id: P1_NOM_Doel
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: > 
         {{ (states('sensor.p1_aansturing_vermogen') | float(0) + (states('sensor.zendure_2400_ac_vermogen_aansturing') | float(0) * -1)) | round(0) }}

      - name: "Zendure 2400 AC Relais Schakelingen Totaal (Vandaag)"
        unique_id: Zendure_2400_AC_Relais_Schakelingen_Totaal_Vandaag
        icon: mdi:swap-vertical-bold
        state_class: total_increasing
        state: >
          {% set ontladen = states('sensor.zendure_2400_ac_relais_schakelingen_ontladen_vandaag') | int %}
          {% set opladen = states('sensor.zendure_2400_ac_relais_schakelingen_opladen_vandaag') | int %}
          {% set totaal = ontladen + opladen - 1 %}
          {{ totaal if totaal > 0 else 0 }}

      - name: "P1 Aansturing Vermogen"
        unique_id: P1_Aansturing_Vermogen
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: >
         {% set afwijkend = states('input_text.afwijkende_p1_sensor') %}
         {% if afwijkend | lower | regex_match('^sensor\\..+') and states(afwijkend) not in ['unknown', 'unavailable', 'none'] %}
         {{ states(afwijkend) | float(0) }}
         {% else %}
         {{ states('sensor.homewizard_p1_vermogen') | float(0) }}
         {% endif %}

      - name: "Dynamisch Nordpool"
        unique_id: dynamisch_nordpool
        icon: mdi:cash
        unit_of_measurement: "€/kWh"
        state: >-
          {% set ingevuld = states('input_text.dynamisch_nordpool_sensor') %}
          {% if ingevuld | lower | regex_match('^sensor\\..+') and states(ingevuld) not in ['unknown', 'unavailable', 'none'] %}
            {% set nordpool = ingevuld %}
          {% else %}
            {% set nordpool = none %}
          {% endif %}

          {% if nordpool is not none %}
            {% set use_15_min = is_state('input_boolean.dynamisch_15_minuten', 'on') %}
            {% if use_15_min %}
              {% set data = state_attr(nordpool, 'raw_today') or [] %}
              {% set nowts = as_timestamp(now()) %}
              {% set current = namespace(val=None) %}
              {% for p in data %}
                {% set s = as_timestamp(as_datetime(p.start)) %}
                {% set e = as_timestamp(as_datetime(p.end)) %}
                {% if nowts >= s and nowts < e %}
                  {% set current.val = (p.value) | round(5) %}
                {% endif %}
              {% endfor %}
              {{ current.val if current.val is not none else 'unknown' }}
            {% else %}
              {% set raw = state_attr(nordpool, 'raw_today') %}
              {% set nu = now() %}
              {% if raw %}
                {% set current_hour_values = raw 
                  | selectattr('start', '>=', nu.replace(minute=0, second=0, microsecond=0)) 
                  | selectattr('start', '<', nu.replace(minute=0, second=0, microsecond=0) + timedelta(hours=1)) 
                  | map(attribute='value') 
                  | list %}
                {% if current_hour_values %}
                  {{ (current_hour_values | sum / current_hour_values | count) | round(5) }}
                {% else %}
                  {{ states(nordpool) }}
                {% endif %}
              {% else %}
                {{ states(nordpool) }}
              {% endif %}
            {% endif %}
          {% else %}
            unknown
          {% endif %}
        attributes:
          raw_today: >-
            {% set ingevuld = states('input_text.dynamisch_nordpool_sensor') %}
            {% if ingevuld | lower | regex_match('^sensor\\..+') and states(ingevuld) not in ['unknown', 'unavailable', 'none'] %}
              {% set nordpool = ingevuld %}
            {% else %}
              {% set nordpool = none %}
            {% endif %}

            {% if nordpool is not none %}
              {% set use_15_min = is_state('input_boolean.dynamisch_15_minuten', 'on') %}
              {% set raw = state_attr(nordpool, 'raw_today') %}
              {% if raw %}
                [
                {% if use_15_min %}
                  {% for item in raw %}
                    {
                      "start": "{{ item.start.isoformat() }}",
                      "end": "{{ item.end.isoformat() }}",
                      "value": {{ item.value }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% else %}
                  {% set hourly = raw | groupby('start.hour') %}
                  {% for hour_group in hourly %}
                    {% set values = hour_group.list | map(attribute='value') | list %}
                    {% set hour_start = hour_group.list[0].start.replace(minute=0, second=0, microsecond=0) %}
                    {% set hour_end = hour_start + timedelta(hours=1) %}
                    {
                      "start": "{{ hour_start.isoformat() }}",
                      "end": "{{ hour_end.isoformat() }}",
                      "value": {{ (values | sum / values | count) | round(5) }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% endif %}
                ]
              {% else %}
                []
              {% endif %}
            {% else %}
              []
            {% endif %}
          raw_tomorrow: >-
            {% set ingevuld = states('input_text.dynamisch_nordpool_sensor') %}
            {% if ingevuld | lower | regex_match('^sensor\\..+') and states(ingevuld) not in ['unknown', 'unavailable', 'none'] %}
              {% set nordpool = ingevuld %}
            {% else %}
              {% set nordpool = none %}
            {% endif %}

            {% if nordpool is not none %}
              {% set use_15_min = is_state('input_boolean.dynamisch_15_minuten', 'on') %}
              {% set raw = state_attr(nordpool, 'raw_tomorrow') %}
              {% if raw %}
                [
                {% if use_15_min %}
                  {% for item in raw %}
                    {
                      "start": "{{ item.start.isoformat() }}",
                      "end": "{{ item.end.isoformat() }}",
                      "value": {{ item.value }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% else %}
                  {% set hourly = raw | groupby('start.hour') %}
                  {% for hour_group in hourly %}
                    {% set values = hour_group.list | map(attribute='value') | list %}
                    {% set hour_start = hour_group.list[0].start.replace(minute=0, second=0, microsecond=0) %}
                    {% set hour_end = hour_start + timedelta(hours=1) %}
                    {
                      "start": "{{ hour_start.isoformat() }}",
                      "end": "{{ hour_end.isoformat() }}",
                      "value": {{ (values | sum / values | count) | round(5) }}
                    }{% if not loop.last %},{% endif %}
                  {% endfor %}
                {% endif %}
                ]
              {% else %}
                []
              {% endif %}
            {% else %}
              []
            {% endif %}
          max_tomorrow: >-
            {% set data = state_attr('sensor.dynamisch_nordpool','raw_tomorrow') %}
            {% if data %}
            {{ data | map(attribute='value') | max | round(5) }}
            {% else %}
              0
            {% endif %}
          min_tomorrow: >-
            {% set data = state_attr('sensor.dynamisch_nordpool','raw_today') %}
            {% if data %}
            {{ data | map(attribute='value') | min | round(5) }}
            {% else %}
              0
            {% endif %}
          max_today: >-
            {% set data = state_attr('sensor.dynamisch_nordpool','raw_today') %}
            {% if data %}
            {{ data | map(attribute='value') | max | round(5) }}
            {% else %}
              0
            {% endif %}
          min_today: >-
            {% set data = state_attr('sensor.dynamisch_nordpool','raw_today') %}
            {% if data %}
            {{ data | map(attribute='value') | min | round(5) }}
            {% else %}
              0
            {% endif %}
            
      - name: "Dynamisch Spread Indicatie"
        unique_id: dynamisch_spread_indicatie
        icon: mdi:percent-box
        unit_of_measurement: "%"
        state: >
          {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
          {% set goedkoop = uren | selectattr('goedkoop','equalto','ja') | list %}
          {% set duur = uren | selectattr('duur','equalto','ja') | list %}
          {% if goedkoop | count > 0 and duur | count > 0 %}
            {% set avg_goedkoop = goedkoop | map(attribute='value') | sum / goedkoop | count %}
            {% set avg_duur = duur | map(attribute='value') | sum / duur | count %}
            {{ ((avg_duur - avg_goedkoop) / avg_goedkoop * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        attributes:
          handmatige_periode: >
            {% if states('input_text.dynamisch_handmatige_periode') | length > 0 %}
              n.v.t.
            {% else %}
              {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
              {% set ns = namespace(result=[]) %}
              {% for uur in uren %}
                {% if uur.goedkoop == 'ja' %}
                  {% set ns.result = ns.result + ['G' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% elif uur.duur == 'ja' %}
                  {% set ns.result = ns.result + ['D' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% endif %}
              {% endfor %}
              {{ ns.result | join(';') }}
            {% endif %}
          goedkoopste_periode: >
            {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
            {% set goedkoop = uren | selectattr('goedkoop','equalto','ja') | sort(attribute='start') | list %}
            [
            {% for uur in goedkoop %}
              "{{ (uur.start | as_datetime).strftime('%H:%M') }} - €{{ '%.4f' | format(uur.value) }}"
              {% if not loop.last %}, {% endif %}
            {% endfor %}
            ]
          duurste_periode: >
            {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
            {% set duur = uren | selectattr('duur','equalto','ja') | sort(attribute='start') | list %}
            [
            {% for uur in duur %}
              "{{ (uur.start | as_datetime).strftime('%H:%M') }} - €{{ '%.4f' | format(uur.value) }}"
              {% if not loop.last %}, {% endif %}
            {% endfor %}
            ]
          gemiddelde_goedkoop: >
            {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
            {% set goedkoop = uren | selectattr('goedkoop','equalto','ja') | list %}
            {% if goedkoop | count > 0 %}
              €{{ '%.4f' % (goedkoop | map(attribute='value') | sum / goedkoop | count) }}
            {% else %}
              n.v.t.
            {% endif %}
          gemiddelde_duur: >
            {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
            {% set duur = uren | selectattr('duur','equalto','ja') | list %}
            {% if duur | count > 0 %}
              €{{ '%.4f' % (duur | map(attribute='value') | sum / duur | count) }}
            {% else %}
              n.v.t.
            {% endif %}
          verschil_waarde: >
            {% set g = state_attr('sensor.dynamisch_spread_indicatie','gemiddelde_goedkoop') %}
            {% set d = state_attr('sensor.dynamisch_spread_indicatie','gemiddelde_duur') %}
            {% if g not in ['n.v.t.', None] and d not in ['n.v.t.', None] %}
              €{{ '%.4f' % (d[1:] | float - g[1:] | float) }}
            {% else %}
              n.v.t.
            {% endif %}

      - name: "Dynamisch Spread Indicatie NOM"
        unique_id: dynamisch_spread_indicatie_NOM
        icon: mdi:percent-box
        unit_of_measurement: "%"
        state: >
          {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
          {% set duurste = state_attr('sensor.dynamisch_goedkoopste_periode', 'duurste_na_eerste_goedkope') or [] %}

          {% set goedkope_uren = uren | selectattr('goedkoop','equalto','ja') | list %}
          {% set dure_uren = duurste | list %}

          {% if goedkope_uren | count > 0 and dure_uren | count > 0 %}
            {% set avg_goedkoop = goedkope_uren | map(attribute='value') | sum / goedkope_uren | count %}
            {% set avg_duur = dure_uren | map(attribute='value') | sum / dure_uren | count %}
            {{ ((avg_duur - avg_goedkoop) / avg_goedkoop * 100) | round(1) }}
          {% else %}
            0
          {% endif %}
        attributes:
          handmatige_periode: >
            {% if states('input_text.dynamisch_handmatige_periode') | length > 0 %}
              n.v.t.
            {% else %}
              {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
              {% set ns = namespace(result=[]) %}
              {% for uur in uren %}
                {% if uur.goedkoop == 'ja' %}
                  {% set ns.result = ns.result + ['G' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% elif uur.duur == 'ja' %}
                  {% set ns.result = ns.result + ['D' ~ (uur.start | as_datetime).strftime('%H:%M')] %}
                {% endif %}
              {% endfor %}
              {{ ns.result | join(';') }}
            {% endif %}
          goedkoopste_periode: >
            {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'raw_today') or [] %}
            {% set goedkoop = uren | selectattr('goedkoop','equalto','ja') | sort(attribute='start') | list %}
            [
            {% for uur in goedkoop %}
              "{{ (uur.start | as_datetime).strftime('%H:%M') }} - €{{ '%.4f' | format(uur.value) }}"
              {% if not loop.last %}, {% endif %}
            {% endfor %}
            ]
          duurste_periode: >
            {% set uren = state_attr('sensor.dynamisch_goedkoopste_periode', 'duurste_na_eerste_goedkope') or [] %}
            {% set duur = uren | sort(attribute='value', reverse=true) | list %}
            [
            {% for uur in duur %}

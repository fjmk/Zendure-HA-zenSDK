                  "duur": "{{ 'ja' if uur.start in ns.dure_starttijden else 'nee' }}"
                }{% if not loop.last %},{% endif %}
              {% endfor %}
              ]
            {% else %}
              []
            {% endif %}
          duurste_na_eerste_goedkope: >
            {% set prijzen = state_attr('sensor.dynamisch_goedkoopste_periode','raw_today') %}
            {% if prijzen %}
              {% set eerste_goedkoop = prijzen
                | selectattr('goedkoop','eq','ja')
                | map(attribute='start')
                | map('as_datetime')
                | sort
                | first %}
              [
              {% for uur in prijzen
                if uur.duur == 'ja'
                and (uur.start | as_datetime > eerste_goedkoop)
              %}
                {
                  "start": "{{ uur.start }}",
                  "end": "{{ uur.end }}",
                  "value": {{ uur.value }},
                  "goedkoop": "{{ uur.goedkoop }}",
                  "duur": "ja"
                }{% if not loop.last %},{% endif %}
              {% endfor %}
              ]
            {% else %}
              []
            {% endif %}
          duurste_na_eerste_goedkope_morgen: >
            {% set prijzen = state_attr('sensor.dynamisch_goedkoopste_periode','raw_tomorrow') %}

            {% if prijzen %}
              {% set eerste_goedkoop = prijzen
                | selectattr('goedkoop','eq','ja')
                | map(attribute='start')
                | map('as_datetime')
                | sort
                | first %}
              [
              {% for uur in prijzen
                if uur.duur == 'ja'
                and (uur.start | as_datetime > eerste_goedkoop)
              %}
                {
                  "start": "{{ uur.start }}",
                  "end": "{{ uur.end }}",
                  "value": {{ uur.value }},
                  "goedkoop": "{{ uur.goedkoop }}",
                  "duur": "ja"
                }{% if not loop.last %},{% endif %}
              {% endfor %}
              ]
            {% else %}
              []
            {% endif %}

      - name: "Zendure 2400 AC Efficiëntie Export"
        unique_id: zendure_2400_ac_efficientie_export
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent-box
        state: >
          {% set ac = states('sensor.zendure_2400_ac_vermogen_export') | float(0) %}
          {% set dc = states('sensor.zendure_2400_ac_vermogen_export_dc') | float(0) %}
          {% if ac > 0 and dc > 0 %}
            {% set efficiency = (ac / dc) * 100 %}
            {{ [0, [efficiency, 100] | min] | max | round(1) }}
          {% else %}
            0
          {% endif %}

      - name: "Zendure 2400 AC Efficiëntie Import"
        unique_id: zendure_2400_ac_efficientie_import
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent-box
        state: >
          {% set ac = states('sensor.zendure_2400_ac_vermogen_import') | float(0) %}
          {% set dc = states('sensor.zendure_2400_ac_vermogen_import_dc') | float(0) %}
          {% if ac > 0 and dc > 0 %}
            {% set efficiency = (dc / ac) * 100 %}
            {{ [0, [efficiency, 100] | min] | max | round(1) }}
          {% else %}
            0
          {% endif %}

      - name: "Zendure 2400 AC Indicatie Beschikbare Energie"
        unique_id: Zendure_2400_AC_Indicatie_Beschikbare_Energie
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:lightning-bolt-circle
        state: >
          {% set laad = states('sensor.zendure_2400_ac_laadpercentage') | float(0) %}
          {% set min_laad = states('sensor.zendure_2400_ac_minimale_laadpercentage') | float(0) %}
          {% set max_laad = states('sensor.zendure_2400_ac_maximale_laadpercentage') | float(100) %}
          {% set totale_capaciteit = states('sensor.zendure_2400_ac_totale_capaciteit') | float(0) %}

          {% set export_eff = states('sensor.zendure_2400_ac_efficientie_export_24u_gemiddelde') | float(0) %}
          {% set rte_totaal = states('sensor.zendure_2400_ac_rte_totaal') | float(0) %}

          {% set effectief_laad = [laad, max_laad] | min %}
          {% set rte_export_equivalent = (rte_totaal / 100) ** 0.5 * 100 %}

          {% if export_eff < 70 %}
            {% set effectieve_eff = rte_export_equivalent %}
          {% else %}
            {% set effectieve_eff = export_eff %}
          {% endif %}

          {% set effectieve_eff = [effectieve_eff, 100] | min / 100 %}
          {% set bruikbaar_percentage = effectief_laad - min_laad %}

          {% if bruikbaar_percentage <= 0 %}
            0
          {% else %}
            {{ (bruikbaar_percentage / 100 * totale_capaciteit * effectieve_eff) | round(2) }}
          {% endif %}
        attributes:
          totale_capaciteit_kwh: >
            {{ states('sensor.zendure_2400_ac_totale_capaciteit') }}
          bruikbaar_percentage: >
            {% set laad = states('sensor.zendure_2400_ac_laadpercentage') | float(0) %}
            {% set min_laad = states('sensor.zendure_2400_ac_minimale_laadpercentage') | float(0) %}
            {% set max_laad = states('sensor.zendure_2400_ac_maximale_laadpercentage') | float(100) %}
            {{ ([laad, max_laad] | min - min_laad) | round(1) }} %
          gebruikte_export_efficiëntie: >
            {% set export_eff = states('sensor.zendure_2400_ac_efficientie_export_24u_gemiddelde') | float(0) %}
            {% set rte_totaal = states('sensor.zendure_2400_ac_rte_totaal') | float(0) %}
            {% set rte_export_equivalent = (rte_totaal / 100) ** 0.5 * 100 %}
            {% if export_eff < 70 %}
              {{ rte_export_equivalent | round(1) }} %
            {% else %}
              {{ export_eff | round(1) }} %
            {% endif %}
          bron_export_efficiëntie: >
            {% set export_eff = states('sensor.zendure_2400_ac_efficientie_export_24u_gemiddelde') | float(0) %}
            {% if export_eff < 70 %}
              RTE totaal (√RTE × 100)
            {% else %}
              Export efficiëntie 24u gemiddelde
            {% endif %}

      - name: "Zendure 2400 AC RTE Totaal"
        unique_id: Zendure_2400_AC_RTE_Totaal
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:percent-box
        state: >
          {% set energy_import = states('sensor.zendure_2400_ac_energie_import') | float(0) %}
          {% set energy_export = states('sensor.zendure_2400_ac_energie_export') | float(0) %}
          {% if energy_import > 0 %}
            {% set percentage = ((energy_export / energy_import) * 100) | round(2) %}
            {% if 0 <= percentage <= 100 %}
              {{ percentage }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}

rest:
  - resource_template: "http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/report"
    scan_interval: 1
    sensor:
      - name: "Zendure 2400 AC Productserie"
        unique_id: Zendure_2400_AC_Productserie
        value_template: "{{ value_json.product }}"
        icon: mdi:identifier

      - name: "Zendure 2400 AC Totale Capaciteit"
        unique_id: Zendure_2400_AC_Totale_Capaciteit
        unit_of_measurement: "kWh"
        icon: mdi:flip-vertical
        value_template: >
          {% set mapping = {
            5: 2.88,
            70: 1.92,
            300: 1.92,
            350: 2.88,
            500: 2.40
          } %}
          {% set packs = value_json.packData %}
          {% if packs %}
            {% set ns = namespace(total=0) %}
            {% for pack in packs %}
              {% set type = pack.packType | int %}
              {% if type in mapping %}
                {% set ns.total = ns.total + mapping[type] %}
              {% endif %}
            {% endfor %}
            {{ ns.total | round(2) }}
          {% else %}
            0
          {% endif %}

      - name: "Zendure 2400 AC Omvormer Max. Oplaadvermogen"
        value_template: "{{ value_json['properties']['chargeMaxLimit'] }}"
        unique_id: zendure_2400_ac_omvormer_max_oplaadvermogen
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power

      - name: "Zendure 2400 AC Omvormer Max. Ontlaadvermogen"
        value_template: "{{ value_json['properties']['inverseMaxPower'] }}"
